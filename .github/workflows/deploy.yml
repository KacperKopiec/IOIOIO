name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Set up SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Rsync dist to server (with retry)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          SSH_OPTS="-i ~/.ssh/id_ed25519 -o ConnectTimeout=15 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          for attempt in 1 2 3 4 5; do
            if rsync -avz --delete \
                -e "ssh $SSH_OPTS" \
                frontend/dist/ \
                ubuntu@"$SSH_HOST":/home/ubuntu/IOIOIO/frontend/dist/; then
              echo "Deploy succeeded on attempt $attempt"
              exit 0
            fi
            delay=$((5 * 2 ** (attempt - 1)))
            echo "Attempt $attempt failed, retrying in ${delay}s..."
            sleep "$delay"
          done
          echo "All 5 retries exhausted"
          exit 1
